<!DOCTYPE html>
<html>
<head>
<title>AI Resume Analyzer</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
<link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>

<body>
<div class="container d-flex align-items-center justify-content-center vh-100">
<div class="card p-4 col-md-6 text-center">

<h2>AI Resume Analyzer</h2>
<p class="text-muted">ML-Powered ATS & Career Recommendation</p>

<form method="POST" enctype="multipart/form-data">
<input type="file" name="resume" class="form-control mb-3" required>

<textarea name="job_desc" class="form-control mb-3"
placeholder="Paste Job Description (Optional)"></textarea>

<button class="btn btn-primary w-100">Analyze Resume</button>
</form>

</div>
</div>
</body>
</html>
